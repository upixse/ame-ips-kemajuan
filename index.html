    // --- STRUKTUR DATA TIM ---
    const TEAMS = [
      { id: 't1', name: "Tim Garuda", theme: "Maritim & Pangan", icon: 'Shield', colorClass: "bg-blue-500 hover:bg-blue-600 text-white", borderClass: "border-blue-200", lightBg: "bg-blue-50", levels: GARUDA_LEVELS },
      { id: 't2', name: "Tim Harimau", theme: "Hilirisasi Tambang", icon: 'Flame', colorClass: "bg-orange-500 hover:bg-orange-600 text-white", borderClass: "border-orange-200", lightBg: "bg-orange-50", levels: HARIMAU_LEVELS },
      { id: 't3', name: "Tim Komodo", theme: "Ekonomi Digital", icon: 'Leaf', colorClass: "bg-emerald-600 hover:bg-emerald-700 text-white", borderClass: "border-emerald-200", lightBg: "bg-emerald-50", levels: KOMODO_LEVELS }
    ];

    // Helper
    const getLevelZones = (teamId, levelIdx) => {
      const team = TEAMS.find(t => t.id === teamId);
      return team.levels[levelIdx].zones.map(z => ({ ...z, current: null }));
    };

    // --- MAIN APP COMPONENT ---
    function App() {
      const [teamsState, setTeamsState] = useState(() => {
        const initial = {};
        TEAMS.forEach(t => { 
          initial[t.id] = { levelIdx: 0, status: 'not_started', zones: getLevelZones(t.id, 0) }; 
        });
        return initial;
      });

      const [activeTeamId, setActiveTeamId] = useState(null);
      const [selectedAsset, setSelectedAsset] = useState(null);

      const activeTeam = TEAMS.find(t => t.id === activeTeamId);
      const activeTeamData = activeTeamId ? teamsState[activeTeamId] : null;
      const currentLevel = activeTeamData && activeTeamData.levelIdx < 3 ? activeTeam.levels[activeTeamData.levelIdx] : null;
      const activeZones = activeTeamData ? activeTeamData.zones : [];
      const currentStatus = activeTeamData ? activeTeamData.status : null;

      const updateActiveTeam = (updates) => {
        setTeamsState(prev => ({
          ...prev,
          [activeTeamId]: { ...prev[activeTeamId], ...updates }
        }));
      };

      const handleDragStart = (e, asset) => {
        e.dataTransfer.setData('assetId', asset.id);
        setSelectedAsset(asset);
      };

      const handleDrop = (e, zoneId) => {
        e.preventDefault();
        const assetId = e.dataTransfer.getData('assetId');
        const asset = currentLevel.assets.find(a => a.id === assetId) || selectedAsset;
        if (asset) placeAssetInZone(asset, zoneId);
      };

      const handleAssetClick = (asset) => {
        if (currentStatus === 'success') return;
        setSelectedAsset(selectedAsset?.id === asset.id ? null : asset);
      };

      const handleZoneClick = (zoneId) => {
        if (currentStatus === 'success') return;
        const zone = activeZones.find(z => z.id === zoneId);
        
        if (zone.current && !selectedAsset) {
          removeAssetFromZone(zoneId);
          return;
        }
        if (selectedAsset) {
          placeAssetInZone(selectedAsset, zoneId);
        }
      };

      const placeAssetInZone = (asset, zoneId) => {
        const newZones = activeZones.map(z => {
          if (z.id === zoneId) return { ...z, current: asset };
          if (z.current?.id === asset.id) return { ...z, current: null };
          return z;
        });
        updateActiveTeam({ zones: newZones, status: 'playing' });
        setSelectedAsset(null);
      };

      const removeAssetFromZone = (zoneId) => {
        const newZones = activeZones.map(z => z.id === zoneId ? { ...z, current: null } : z);
        updateActiveTeam({ zones: newZones });
      };

      const checkResult = () => {
        if (activeZones.some(z => !z.current)) {
          alert("Lengkapi semua bagan terlebih dahulu!");
          return;
        }
        const isCorrect = activeZones.every(z => z.current.type === z.expected);
        updateActiveTeam({ status: isCorrect ? 'success' : 'error' });
      };

      const nextLevel = () => {
        const nextIdx = activeTeamData.levelIdx + 1;
        if (nextIdx < 3) {
          updateActiveTeam({ levelIdx: nextIdx, status: 'playing', zones: getLevelZones(activeTeamId, nextIdx) });
        } else {
          updateActiveTeam({ status: 'finished_all' });
          setActiveTeamId(null);
        }
        setSelectedAsset(null);
      };

      const backToMenu = () => {
        setActiveTeamId(null);
        setSelectedAsset(null);
      };

      const resetEntireGame = () => {
        const initial = {};
        TEAMS.forEach(t => { initial[t.id] = { levelIdx: 0, status: 'not_started', zones: getLevelZones(t.id, 0) }; });
        setTeamsState(initial);
        setActiveTeamId(null);
      };

      const allTeamsFinished = Object.values(teamsState).every(s => s.status === 'finished_all');
      const activeAssetsInBank = currentLevel ? currentLevel.assets.filter(a => !activeZones.some(z => z.current?.id === a.id)) : [];

      if (!activeTeamId) {
        if (allTeamsFinished) {
          return (
            <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
              <div className="bg-white p-10 rounded-3xl shadow-2xl border border-indigo-100 text-center max-w-3xl w-full animate-in zoom-in">
                <Icon name="Trophy" className="w-28 h-28 text-yellow-400 mx-auto mb-6 animate-bounce" />
                <h2 className="text-4xl md:text-5xl font-black text-slate-800 mb-4">MISI KELAS BERHASIL!</h2>
                <p className="text-xl md:text-2xl text-slate-600 mb-8 leading-relaxed font-medium">
                  Ketiga tim telah menguasai sektor Maritim, Tambang, dan Digital secara tuntas.
                  <br/><br/><span className="text-indigo-600 font-bold">Kolaborasi kalian mewujudkan Indonesia Maju!</span>
                </p>
                <button onClick={resetEntireGame} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg hover:shadow-xl transition-all hover:-translate-y-1 inline-flex items-center gap-3">
                  <Icon name="RotateCcw" className="w-6 h-6" /> Main Lagi dari Awal
                </button>
              </div>
            </div>
          );
        }

        return (
          <div className="min-h-screen bg-slate-50 p-6 md:p-12 flex flex-col items-center">
            <header className="mb-12 text-center">
              <div className="inline-flex items-center gap-2 bg-indigo-100 text-indigo-800 px-5 py-2 rounded-full font-bold text-sm md:text-base mb-4 shadow-sm">
                <Icon name="Users" className="w-5 h-5" /> Misi Lintas Sektor (Berbobot Sama)
              </div>
              <h1 className="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4">Merakit Kemajuan Negeri</h1>
              <p className="text-lg md:text-xl text-slate-600 max-w-2xl mx-auto">
                Setiap tim memiliki <span className="font-bold">Tema Sektor</span> yang berbeda untuk dirangkai menjadi pondasi negara maju.
              </p>
            </header>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl">
              {TEAMS.map(team => {
                const state = teamsState[team.id];
                const isCompleted = state.status === 'finished_all';
                
                return (
                  <div key={team.id} onClick={() => !isCompleted && setActiveTeamId(team.id)} className={`relative flex flex-col p-8 rounded-3xl transition-all duration-300 shadow-md border-4 ${isCompleted ? 'bg-slate-100 border-slate-300 opacity-90 cursor-default' : 'bg-white cursor-pointer hover:shadow-xl hover:-translate-y-2 ' + team.borderClass}`}>
                    {isCompleted && (
                      <div className="absolute -top-4 -right-4 bg-green-500 text-white p-3 rounded-full shadow-lg z-10 flex items-center gap-1">
                        <Icon name="CheckCircle" className="w-6 h-6" /> <span className="font-bold pr-2">Tuntas!</span>
                      </div>
                    )}
                    
                    <div className={`w-20 h-20 rounded-2xl flex items-center justify-center mb-6 shadow-inner ${isCompleted ? 'bg-slate-300 text-slate-500' : team.colorClass}`}>
                      <Icon name={team.icon} className="w-10 h-10" />
                    </div>
                    
                    <h3 className="text-2xl font-black text-slate-800 mb-1">{team.name}</h3>
                    <p className="text-sm font-bold text-slate-500 mb-4 uppercase tracking-wider">{team.theme}</p>
                    
                    {!isCompleted ? (
                       <div className={`mb-4 inline-block px-4 py-2 rounded-lg self-start font-bold border ${team.borderClass} ${team.lightBg}`}>
                         Progres: Tahap {state.levelIdx + 1} dari 3
                       </div>
                    ) : (
                       <div className="mb-4 inline-block px-4 py-2 rounded-lg self-start font-bold border border-green-200 bg-green-50 text-green-700">
                         3 Tahap Selesai
                       </div>
                    )}
                    
                    <p className="text-slate-600 flex-1 mb-6 font-medium">
                      {isCompleted ? `Tim ini telah sukses menguasai sektor ${team.theme}.` : state.levelIdx === 0 ? "Siap memulai tantangan Tahap 1." : `Lanjut selesaikan Tahap ${state.levelIdx + 1}.`}
                    </p>
                    
                    <button disabled={isCompleted} className={`py-3 px-6 rounded-xl font-bold transition-colors w-full text-center ${isCompleted ? 'bg-slate-200 text-slate-400' : team.colorClass}`}>
                      {isCompleted ? 'Misi Selesai' : 'Mulai Bermain'}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      if (currentStatus === 'finished_all') return null;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8 flex flex-col">
          <header className="mb-6 relative">
            <button onClick={backToMenu} className="absolute left-0 top-0 bg-white border-2 border-slate-200 text-slate-600 hover:bg-slate-100 font-bold py-2 px-4 rounded-full inline-flex items-center gap-2 shadow-sm transition-colors z-10">
              <Icon name="Home" className="w-5 h-5" /> <span className="hidden sm:inline">Menu Utama</span>
            </button>

            <div className="text-center w-full max-w-4xl mx-auto px-16">
              <div className="flex flex-wrap items-center justify-center gap-3 mb-2">
                <div className={`inline-flex items-center gap-2 px-4 py-1.5 rounded-full font-bold text-sm shadow-sm ${activeTeam.colorClass}`}>
                  <Icon name={activeTeam.icon} className="w-4 h-4" /> {activeTeam.name} : {activeTeam.theme}
                </div>
                <div className={`inline-flex items-center gap-2 px-4 py-1.5 rounded-full font-bold text-sm shadow-sm border ${activeTeam.borderClass} ${activeTeam.lightBg} text-slate-700`}>
                  Progres: {activeTeamData.levelIdx + 1} / 3
                </div>
              </div>

              <h1 className="text-2xl md:text-3xl font-bold text-slate-900 mb-2">{currentLevel.title}</h1>
              <p className="text-base md:text-lg text-slate-600 mb-2">{currentLevel.desc}</p>
              <p className="text-sm text-indigo-600 flex items-center justify-center gap-1 font-medium bg-indigo-50 py-1 px-3 rounded-full inline-flex">
                <Icon name="MousePointerClick" className="w-4 h-4 animate-bounce" />
                Seret (Drag) atau Klik aset, lalu masukkan ke dalam kotak.
              </p>
            </div>
          </header>

          <div className="flex flex-col lg:flex-row gap-6 max-w-7xl mx-auto w-full flex-1">
            
            <div className="w-full lg:w-1/3 bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
              <h2 className="text-xl font-bold mb-4 text-slate-800 border-b pb-2">Bank Kartu Aset</h2>
              
              <div className="flex flex-wrap lg:flex-col gap-3 justify-center">
                {activeAssetsInBank.map(asset => {
                  const isSelected = selectedAsset?.id === asset.id;
                  const isDisabled = currentStatus === 'success';
                  
                  return (
                    <div
                      key={asset.id}
                      draggable={!isDisabled}
                      onDragStart={(e) => !isDisabled && handleDragStart(e, asset)}
                      onClick={() => !isDisabled && handleAssetClick(asset)}
                      className={`flex items-center gap-3 p-3 md:p-4 rounded-xl border-2 transition-all duration-200 w-full sm:w-[calc(50%-0.5rem)] lg:w-full ${asset.color} ${isDisabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer shadow-sm'} ${isSelected ? `ring-4 ring-offset-2 scale-[1.02] border-transparent ${activeTeam.lightBg}` : (!isDisabled && 'hover:scale-[1.02] hover:shadow-md')}`}
                    >
                      <div className="bg-white/70 p-2 rounded-lg shrink-0 shadow-sm">
                        <Icon name={asset.icon} className="w-6 h-6 md:w-8 md:h-8" />
                      </div>
                      <span className="font-bold text-sm md:text-base leading-tight">{asset.name}</span>
                    </div>
                  );
                })}
                
                {activeAssetsInBank.length === 0 && (
                  <div className="w-full p-8 text-center border-2 border-dashed border-slate-300 rounded-xl text-slate-400 font-medium">
                    Aset sudah dipindahkan ke bagan.
                  </div>
                )}
              </div>
            </div>

            <div className="w-full lg:w-2/3 bg-white p-5 md:p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
              <div>
                <h2 className="text-xl font-bold mb-6 text-slate-800 border-b pb-2 text-center">Bagan Pembangunan</h2>
                
                <div className="flex flex-wrap items-center justify-center gap-y-6 md:gap-y-8">
                  {activeZones.map((zone, index) => (
                    <React.Fragment key={zone.id}>
                      <div className="flex flex-col items-center w-24 sm:w-32 md:w-36 shrink-0">
                        <div className="text-xs md:text-sm font-semibold text-slate-500 mb-2 text-center h-8 flex items-end justify-center px-1">
                          {zone.title}
                        </div>
                        
                        <div 
                          onDragOver={(e) => e.preventDefault()}
                          onDrop={(e) => handleDrop(e, zone.id)}
                          onClick={() => handleZoneClick(zone.id)}
                          className={`w-full aspect-square rounded-xl border-4 border-dashed flex flex-col items-center justify-center p-2 md:p-3 transition-all ${currentStatus === 'success' ? '' : 'cursor-pointer'} ${selectedAsset && !zone.current ? 'border-indigo-400 bg-indigo-50 animate-pulse' : 'border-slate-300 bg-slate-50'} ${zone.current ? 'border-solid border-transparent shadow-md cursor-default' : ''} ${currentStatus === 'error' && !zone.current ? 'border-red-300 bg-red-50' : ''}`}
                        >
                          {zone.current ? (
                             <div className={`w-full h-full flex flex-col items-center justify-center rounded-lg border-2 shadow-sm ${zone.current.color}`}>
                                <div className="bg-white/80 p-2 md:p-3 rounded-full mb-1 shadow-sm">
                                  <Icon name={zone.current.icon} className="w-6 h-6 md:w-8 md:h-8" />
                                </div>
                                <span className="font-bold text-center text-[10px] md:text-xs leading-tight px-1">{zone.current.name}</span>
                             </div>
                          ) : (
                            <span className="text-slate-400 text-[10px] md:text-xs font-medium text-center">Tarik/Klik ke sini</span>
                          )}
                        </div>
                      </div>

                      {index < activeZones.length - 1 && (
                        <div className="text-slate-300 px-1 md:px-2 flex items-center justify-center pt-8">
                          <Icon name="ArrowRight" className="w-5 h-5 md:w-8 md:h-8" />
                        </div>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              </div>

              <div className="mt-10 text-center flex flex-col items-center">
                {(currentStatus === 'playing' || currentStatus === 'not_started') && (
                  <button onClick={checkResult} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full text-base md:text-lg shadow-lg hover:shadow-xl transition-all hover:-translate-y-1">
                    Cek Jawaban Tim
                  </button>
                )}

                {currentStatus === 'success' && (
                  <div className="bg-green-100 border border-green-400 text-green-800 p-5 md:p-6 rounded-xl w-full max-w-2xl shadow-md animate-in zoom-in">
                    <div className="flex items-center justify-center gap-3 mb-2">
                      <Icon name="CheckCircle" className="w-8 h-8 text-green-600" />
                      <h3 className="text-xl md:text-2xl font-bold">{currentLevel.reflectionTitle}</h3>
                    </div>
                    <div className="bg-white/70 p-4 rounded-lg text-left mb-6 border border-green-200">
                      <p className="font-bold text-green-900 mb-1 text-sm md:text-base">Misi Eksplanasi Lisan:</p>
                      <p className="text-sm md:text-base">{currentLevel.reflectionText}</p>
                    </div>
                    <div className="flex flex-wrap justify-center gap-4">
                      <button onClick={backToMenu} className="bg-white border-2 border-slate-300 text-slate-700 font-bold py-2 px-6 rounded-full hover:bg-slate-100 transition-colors">
                        Kembali ke Menu
                      </button>
                      <button onClick={nextLevel} className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-full shadow-md transition-all hover:-translate-y-1 inline-flex items-center gap-2">
                        {activeTeamData.levelIdx < 2 ? 'Lanjut ke Tahap Berikutnya' : 'Selesaikan Misi Tim Ini'} <Icon name="ArrowRightCircle" className="w-5 h-5"/>
                      </button>
                    </div>
                  </div>
                )}

                {currentStatus === 'error' && (
                  <div className="bg-red-100 border border-red-400 text-red-800 p-5 md:p-6 rounded-xl w-full max-w-lg shadow-md animate-in zoom-in">
                    <Icon name="XCircle" className="w-12 h-12 text-red-500 mx-auto mb-2" />
                    <h3 className="text-xl font-bold mb-2">Masih Ada Kesalahan</h3>
                    <p className="mb-6 font-medium text-sm md:text-base">Susunan bagan belum sesuai atau tim memilih kartu pengecoh (jebakan). Diskusikan kembali fungsi tiap aset!</p>
                    <button onClick={() => updateActiveTeam({ status: 'playing' })} className="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-full inline-flex items-center gap-2">
                      <Icon name="RotateCcw" className="w-5 h-5" /> Perbaiki Bagan
                    </button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
